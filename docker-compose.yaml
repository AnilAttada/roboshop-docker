networks:
  default:
    driver: bridge
    name: roboshop
    external: true

services:
  mongodb:
    image: anilattada/mongodb:v1
    container_name: mongodb
  catalogue:
    image: anilattada/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    image: anilattada/user:v1
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    image: anilattada/cart:v1
    container_name: cart
    depends_on:
      - redis
      - catalogue
  mysql:
    image: anilattada/mysql:v1
    container_name: mysql
  shipping:
    image: anilattada/shipping:v1
    container_name: shipping
    depends_on:
      - cart
      - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  payement:
    image: anilattada/payment:v1
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq
  frontend:
    image: anilattada/frontend:v1
    container_name: frontend
    ports:
    - 80:80
    depends_on:
      - catalogue
      - cart
      - shipping
      - user
      - payement