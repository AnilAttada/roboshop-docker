networks:
  default:
    driver: bridge
    name: roboshop
    external: true

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:

services:
  mongodb:
    image: anilattada/mongodb:v1
    container_name: mongodb
    volumes:   # we are mounting the volume
      mongodb:/data/db  #location to where store data in mongodb from documentation
  catalogue:
    image: anilattada/catalogue:v1
    container_name: catalogue
    environment:
      MONGO: true 
      MONGO_URL: mongodb://mongodb:27017/catalogue
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    image: anilattada/user:v1
    container_name: user
    environment:
      MONGO: true
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongodb:27017/users
    depends_on:
      - redis
      - mongodb
  cart:
    image: anilattada/cart:v1
    container_name: cart
    environment:
        REDIS_HOST: redis 
        CATALOGUE_HOST: catalogue 
        CATALOGUE_PORT: 8080
    depends_on:
      - redis
      - catalogue
  mysql:
    image: anilattada/mysql:v1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1
  shipping:
    image: anilattada/shipping:v1
    container_name: shipping
    environment:
      CART_ENDPOINT: cart:8080
      DB_HOST: mysql
    depends_on:
      - cart
      - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  payement:
    image: anilattada/payment:v1
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq
  frontend:
    image: anilattada/frontend:v1
    container_name: frontend
    ports:
    - 80:80
    depends_on:
      - catalogue
      - cart
      - shipping
      - user
      - payement