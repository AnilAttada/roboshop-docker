networks:
  default:
    driver: bridge
    name: roboshop
    external: true

services:
  mongodb:
    image: anilattada/mongodb:v1
    container_name: mongodb
  catalogue:
    image: anilattada/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    image: anilattada/user:v1
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    image: anilattada/cart:v1
    container_name: cart
    depends_on:
      - redis
      - catalogue
  mysql:
    image: anilattada/mysql:v1
    container_name: mysql
  shipping:
    image: anilattada/shipping:v1
    container_name: shipping
    depends_on:
      - cart
      - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq